[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    live: tests that hit real external services (OpenAI, real DB), opt-in via -m live
    integration: tests that hit a real test database
    unit: pure-function tests with no external dependencies

addopts = --strict-markers -v
asyncio_mode = auto
